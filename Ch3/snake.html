<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貪食蛇</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0f0f23;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
}
.container {
    background: #1a1a2e;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(233, 69, 96, 0.15);
}
canvas {
    display: block;
    border-radius: 8px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
}
.info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 4px 0 4px;
    color: #ccc;
}
.stats span {
    font-size: 18px;
    font-weight: bold;
}
.stats .score { color: #e94560; }
.stats .sep { color: #533483; margin: 0 8px; }
.stats .length { color: #00b4d8; }
button {
    background: #e94560;
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.15s;
}
button:hover { background: #c23152; }
.hint {
    color: #666;
    font-size: 13px;
    text-align: center;
    padding-top: 8px;
}
</style>
</head>
<body>
<div class="container">
    <canvas id="game" width="602" height="602"></canvas>
    <div class="info">
        <div class="stats">
            <span class="score">分數: 0</span>
            <span class="sep">|</span>
            <span class="length">長度: 1</span>
        </div>
        <button id="restartBtn">重新開始</button>
    </div>
    <div class="hint">方向鍵 ↑ ↓ ← → 控制蛇的移動</div>
</div>
<script>
const CELL = 20;
const COLS = 30;
const ROWS = 30;
const MOVE_MS = 180;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.querySelector('.score');
const lengthEl = document.querySelector('.length');

let snake, oldSnake, direction, moveDir, food, score, running, moveStart, animId;

function restart() {
    const cx = Math.floor(COLS / 2);
    const cy = Math.floor(ROWS / 2);
    snake = [[cx, cy]];
    oldSnake = [[cx, cy]];
    direction = [1, 0];
    moveDir = [1, 0];
    score = 0;
    running = true;
    moveStart = performance.now();
    scoreEl.textContent = '分數: 0';
    lengthEl.textContent = '長度: 1';
    spawnFood();
}

function spawnFood() {
    const occupied = new Set(snake.map(p => p[0] + ',' + p[1]));
    let pos;
    do {
        pos = [Math.floor(Math.random() * COLS), Math.floor(Math.random() * ROWS)];
    } while (occupied.has(pos[0] + ',' + pos[1]));
    food = pos;
}

function moveSnake() {
    const head = snake[0];
    const nh = [head[0] + direction[0], head[1] + direction[1]];

    if (nh[0] < 0 || nh[0] >= COLS || nh[1] < 0 || nh[1] >= ROWS || snake.some(p => p[0] === nh[0] && p[1] === nh[1])) {
        running = false;
        return;
    }

    oldSnake = snake.map(p => [...p]);
    moveDir = [...direction];
    snake = [nh, ...snake];

    if (nh[0] === food[0] && nh[1] === food[1]) {
        score++;
        scoreEl.textContent = '分數: ' + score;
        lengthEl.textContent = '長度: ' + snake.length;
        spawnFood();
    } else {
        snake.pop();
    }
    moveStart = performance.now();
}

function draw() {
    ctx.clearRect(0, 0, 602, 602);

    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(1, 1, 600, 600);

    ctx.strokeStyle = '#16213e';
    ctx.lineWidth = 1;
    for (let i = 0; i <= COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL + 1, 1);
        ctx.lineTo(i * CELL + 1, 601);
        ctx.stroke();
    }
    for (let i = 0; i <= ROWS; i++) {
        ctx.beginPath();
        ctx.moveTo(1, i * CELL + 1);
        ctx.lineTo(601, i * CELL + 1);
        ctx.stroke();
    }

    if (!running) {
        drawFood(food[0], food[1]);
        drawSnake(1);
        drawGameOver();
        return;
    }

    const elapsed = performance.now() - moveStart;
    const lerp = Math.min(elapsed / MOVE_MS, 1);

    drawFood(food[0], food[1]);
    drawSnake(lerp);
}

function drawFood(fx, fy) {
    const cx = fx * CELL + CELL / 2 + 1;
    const cy = fy * CELL + CELL / 2 + 1;

    ctx.beginPath();
    ctx.ellipse(cx, cy, 8, 8, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#e63946';
    ctx.fill();
    ctx.strokeStyle = '#c1121f';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.beginPath();
    ctx.ellipse(cx - 3, cy - 3, 3, 3, -0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#ff8fa3';
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(cx + 2, cy - 8);
    ctx.lineTo(cx + 1, cy - 13);
    ctx.strokeStyle = '#5c3a21';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.beginPath();
    ctx.ellipse(cx + 2, cy - 13, 4, 3, 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#2a9d8f';
    ctx.fill();
}

function drawSnake(lerp) {
    const md = moveDir;
    const n = snake.length;

    for (let i = 0; i < n; i++) {
        const ox = oldSnake[i] ? oldSnake[i][0] : snake[i][0];
        const oy = oldSnake[i] ? oldSnake[i][1] : snake[i][1];
        const nx = snake[i][0];
        const ny = snake[i][1];

        const x = ox + (nx - ox) * lerp;
        const y = oy + (ny - oy) * lerp;

        const t = n > 1 ? i / (n - 1) : 0;
        const r = Math.round(30 + t * 90);
        const g = Math.round(180 - t * 60);
        const b = Math.round(30 + t * 40);

        const pad = 2;
        ctx.beginPath();
        ctx.ellipse(
            x * CELL + CELL / 2 + 1,
            y * CELL + CELL / 2 + 1,
            (CELL - pad * 2) / 2,
            (CELL - pad * 2) / 2,
            0, 0, Math.PI * 2
        );
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fill();
    }

    const hx = snake[0][0];
    const hy = snake[0][1];
    const phx = hx - md[0] * (1 - lerp);
    const phy = hy - md[1] * (1 - lerp);
    const cx = phx * CELL + CELL / 2 + 1;
    const cy = phy * CELL + CELL / 2 + 1;
    const eo = 4;

    const isHoriz = md[0] !== 0;
    let ex1, ey1, ex2, ey2;
    if (isHoriz) {
        const dx = md[0] > 0 ? 3 : -3;
        ex1 = cx + dx; ey1 = cy - eo;
        ex2 = cx + dx; ey2 = cy + eo;
    } else {
        const dy = md[1] > 0 ? 3 : -3;
        ex1 = cx - eo; ey1 = cy + dy;
        ex2 = cx + eo; ey2 = cy + dy;
    }

    ctx.beginPath();
    ctx.arc(ex1, ey1, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = 'white';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(ex2, ey2, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = 'white';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(ex1, ey1, 1.2, 0, Math.PI * 2);
    ctx.fillStyle = 'black';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(ex2, ey2, 1.2, 0, Math.PI * 2);
    ctx.fillStyle = 'black';
    ctx.fill();
}

function drawGameOver() {
    ctx.fillStyle = 'rgba(26, 26, 46, 0.9)';
    ctx.fillRect(80, 250, 442, 120);
    ctx.strokeStyle = '#e94560';
    ctx.lineWidth = 3;
    ctx.strokeRect(80, 250, 442, 120);

    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 36px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', 301, 316);

    ctx.fillStyle = 'white';
    ctx.font = '18px "Segoe UI", Arial, sans-serif';
    ctx.fillText('得分: ' + score, 301, 349);

    ctx.fillStyle = '#888';
    ctx.font = '12px "Segoe UI", Arial, sans-serif';
    ctx.fillText('按「重新開始」再玩一次', 301, 369);
}

function loop() {
    const now = performance.now();
    if (running && now - moveStart >= MOVE_MS) {
        moveSnake();
    }
    draw();
    animId = requestAnimationFrame(loop);
}

document.addEventListener('keydown', (e) => {
    const map = {
        ArrowUp: [0, -1], ArrowDown: [0, 1],
        ArrowLeft: [-1, 0], ArrowRight: [1, 0],
    };
    const d = map[e.key];
    if (d && running && (d[0] !== -direction[0] || d[1] !== -direction[1])) {
        direction = d;
    }
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
        e.preventDefault();
    }
});

document.getElementById('restartBtn').addEventListener('click', () => {
    restart();
});

restart();
loop();
</script>
</body>
</html>
